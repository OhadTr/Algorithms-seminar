<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithms seminar paper sign-up</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .top { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; margin-bottom: 16px; }
      .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; }
      .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .stat { border: 1px solid #e2e8f0; border-radius: 14px; padding: 16px; }
      .label { font-size: 13px; color: #64748b; }
      .value { font-size: 32px; font-weight: 700; }
      h1,h2,h3,p { margin: 0; }
      h1 { font-size: 32px; margin-bottom: 16px; }
      h2 { font-size: 22px; margin-bottom: 16px; }
      h3 { font-size: 24px; margin-bottom: 16px; }
      .field { margin-bottom: 12px; }
      .field label { display: block; font-size: 14px; margin-bottom: 6px; }
      .field input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1; box-sizing: border-box; }
      .status { margin-bottom: 16px; }
      .papers { display: grid; gap: 12px; }
      .paper { border: 1px solid #e2e8f0; border-radius: 14px; padding: 16px; display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: start; }
      .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
      .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; border: 1px solid #d1d5db; background: #fff; }
      .pill.available { background: #dcfce7; }
      .pill.taken { background: #e5e7eb; }
      .paper-title { font-size: 20px; font-weight: 600; line-height: 1.35; margin-bottom: 6px; }
      .citation { font-size: 14px; color: #475569; margin-bottom: 8px; }
      .summary { font-size: 15px; line-height: 1.45; color: #334155; margin-bottom: 10px; }
      .linkrow { margin-bottom: 10px; }
      a { color: #1d4ed8; }
      button { padding: 10px 14px; border-radius: 12px; border: 1px solid #cbd5e1; background: #0f172a; color: white; cursor: pointer; font-weight: 600; white-space: nowrap; }
      button:disabled { background: #e2e8f0; color: #475569; cursor: not-allowed; }
      @media (max-width: 800px) { .top, .paper { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="card">
          <h1>Algorithms seminar paper sign-up</h1>
          <div class="stats">
            <div class="stat">
              <div class="label">Total papers</div>
              <div class="value" id="total-papers"></div>
            </div>
            <div class="stat">
              <div class="label">Available</div>
              <div class="value" id="available-papers"></div>
            </div>
          </div>
        </div>
        <div class="card">
          <h2>Claim a paper as a pair</h2>
          <div class="field">
            <label for="name">Pair names</label>
            <input id="name" placeholder="Both full names" />
          </div>
          <div class="field">
            <label for="code">Add code</label>
            <input id="code" type="password" placeholder="" />
          </div>
        </div>
      </div>

      <div id="status" class="card status" style="display:none"></div>
      <div id="schedule"></div>
    </div>

    <script>
      const SUPABASE_URL = "https://zdizzifeuqzrqxjxasen.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_xhDks_hxq2ouhD2-8WhkIg_SYZfAmSp";

      const PAPERS = [
        { id: "cuts-2026-07-15-1", date: "July 15, 2026", number: 1, title: "Randomized Approximation Schemes for Cuts and Flows in Capacitated Graphs", citation: "A. A. Benczúr, D. R. Karger. STOC 1996 / SIAM J. Comput. 2015.", link: "https://arxiv.org/abs/cs/0207078", summary: "Introduces cut sparsifiers: near-linear-time construction of a sparse subgraph that approximately preserves every cut. This is the basic sparsification tool behind many later graph-cut algorithms." },
        { id: "cuts-2026-07-22-1", date: "July 22, 2026", number: 2, title: "Expander Decomposition and Pruning: Faster, Stronger, and Simpler", citation: "T. Saranurak, D. Wang. SODA 2019.", link: "https://arxiv.org/abs/1812.08958", summary: "Develops a near-linear-time expander decomposition framework and pruning tools. These ideas are a second major technical foundation for recent near-linear-time min-cut results." },
        { id: "cuts-2026-07-22-2", date: "July 22, 2026", number: 3, title: "Deterministic Min-Cut in Poly-Logarithmic Max-Flows", citation: "J. Li, D. Panigrahi. FOCS 2020 / JACM 2025.", link: "https://arxiv.org/abs/2111.02008", summary: "Reduces deterministic global and Steiner min-cut to only polylogarithmically many max-flow calls. The paper gives a conceptual separation between min-cut and max-flow." },
        { id: "cuts-2026-07-22-3", date: "July 22, 2026", number: 4, title: "Deterministic Near-Linear Time Minimum Cut in Weighted Graphs", citation: "M. Henzinger, J. Li, S. Rao, D. Wang. SODA 2024.", link: "https://arxiv.org/abs/2401.05627", summary: "Gives the first deterministic near-linear-time algorithm for weighted global min-cut. It combines earlier sparsification, decomposition, and clustering ideas into a major static min-cut breakthrough." },
        { id: "cuts-2026-07-29-1", date: "July 29, 2026", number: 5, title: "Cactus Representation of Minimum Cuts: Derandomize and Speed Up", citation: "Z. He, S.-E. Huang, T. Saranurak. SODA 2024.", link: "https://arxiv.org/abs/2401.10856", summary: "Constructs the cactus representation encoding all global minimum cuts in deterministic almost-linear time. This moves from finding one minimum cut to compactly representing the full family." },
        { id: "cuts-2026-07-29-2", date: "July 29, 2026", number: 6, title: "All-Pairs Max-Flow is no Harder than Single-Pair Max-Flow: Gomory-Hu Trees in Almost-Linear Time", citation: "A. Abboud, J. Li, D. Panigrahi, T. Saranurak. FOCS 2023.", link: "https://users.cs.duke.edu/~debmalya/papers/focs23-ghtree.pdf", summary: "Builds Gomory-Hu trees in almost-linear time, reducing all-pairs min-cut structure to essentially the cost of single-pair max-flow. This is a major endpoint of the modern edge-connectivity line." },
        { id: "cuts-2026-07-29-3", date: "July 29, 2026", number: 7, title: "Vertex Connectivity in Poly-Logarithmic Max-Flows", citation: "J. Li, D. Nanongkai, D. Panigrahi, T. Saranurak, S. Yingchareonthawornchai. STOC 2021 / JACM 2025.", link: "https://arxiv.org/abs/2104.00104", summary: "Reduces vertex connectivity to polylogarithmically many max-flow calls, paralleling the edge min-cut reduction. It was the first major running-time improvement for vertex connectivity in decades." },
        { id: "cuts-2026-08-05-1", date: "August 5, 2026", number: 8, title: "Tight Conditional Lower Bounds for Vertex Connectivity Problems", citation: "Z. Huang, Y. Long, T. Saranurak, B. Wang. STOC 2023.", link: "https://arxiv.org/abs/2212.00359", summary: "Proves fine-grained conditional lower bounds for vertex-connectivity variants. The paper explains why all-pairs and Steiner vertex connectivity appear harder than their edge-connectivity analogues." },
        { id: "cuts-2026-08-05-2", date: "August 5, 2026", number: 9, title: "Network Unreliability in Almost-Linear Time", citation: "R. Cen, J. Li, D. Panigrahi. STOC 2025.", link: "https://arxiv.org/abs/2503.23526", summary: "Gives an almost-linear-time FPRAS for network unreliability. It shows how near-minimum cut structure controls a natural probabilistic reliability question." },
        { id: "cuts-2026-08-05-3", date: "August 5, 2026", number: 10, title: "Deterministic and Exact Fully-Dynamic Minimum Cut of Superpolylogarithmic Size in Subpolynomial Time", citation: "A. El-Hayek, M. Henzinger, J. Li. SODA 2026.", link: "https://arxiv.org/abs/2512.13105", summary: "Extends recent static min-cut ideas to the fully dynamic setting. The result gives deterministic exact updates in subpolynomial time when the minimum cut is sufficiently large." },
        { id: "cuts-tbd-1", date: "TBD", number: 11, title: "The Karger-Stein Algorithm is Optimal for k-Cut", citation: "A. Gupta, E. Lee, J. Li. STOC 2020.", link: "https://arxiv.org/abs/1911.09165", summary: "Analyzes the classical Karger-Stein contraction algorithm for fixed minimum k-cut and proves essentially tight success bounds. It also yields tight structural bounds on the number of minimum k-cuts." },
        { id: "cuts-tbd-2", date: "TBD", number: 12, title: "Finding Most Shattering Minimum Vertex Cuts of Polylogarithmic Size in Near-Linear Time", citation: "K. Hua, D. Li, J. Park, T. Saranurak. ICALP 2024.", link: "https://arxiv.org/abs/2405.03801", summary: "Finds most-shattering small minimum vertex cuts in near-linear time, breaking a longstanding quadratic barrier. It brings vertex-failure connectivity oracles into static vertex-cut algorithms." },
      ];
      const DATE_ORDER = ["July 15, 2026", "July 22, 2026", "July 29, 2026", "August 5, 2026", "TBD"];
      let claims = [];
      let submittingId = "";

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      async function fetchClaims() {
        const slotIds = PAPERS.map((paper) => paper.id);
        const response = await fetch(`${SUPABASE_URL}/rest/v1/claims?select=slot_id,student_name,created_at&slot_id=in.(${slotIds.join(",")})`, {
          headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
        });
        if (!response.ok) throw new Error("Failed to load claims.");
        return response.json();
      }

      async function insertClaim(slotId, studentName, code) {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/bright-responder`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ slotId, studentName, code })
        });
        if (response.ok) return;
        const data = await response.json().catch(() => ({}));
        throw new Error(data.error || "Could not save claim.");
      }

      function setStatus(text) {
        const el = document.getElementById("status");
        if (!text) { el.style.display = "none"; el.textContent = ""; return; }
        el.style.display = "block";
        el.innerHTML = `<strong>Status:</strong> ${escapeHtml(text)}`;
      }

      function render() {
        document.getElementById("total-papers").textContent = PAPERS.length;
        document.getElementById("available-papers").textContent = PAPERS.length - claims.length;

        const claimsBySlot = new Map(claims.map(c => [c.slot_id, c]));
        const schedule = document.getElementById("schedule");
        schedule.innerHTML = "";

        DATE_ORDER.forEach((date) => {
          const papersForDate = PAPERS.filter((paper) => paper.date === date);
          const section = document.createElement("div");
          section.className = "card";
          section.style.marginBottom = "16px";
          section.innerHTML = `<h3>${date}</h3><div class="papers"></div>`;
          const papersEl = section.querySelector(".papers");

          papersForDate.forEach((paper) => {
            const claim = claimsBySlot.get(paper.id);
            const taken = Boolean(claim);
            const disabled = taken || submittingId === paper.id;
            const row = document.createElement("div");
            row.className = "paper";
            row.innerHTML = `
              <div>
                <div class="badges">
                  <span class="pill">Paper ${paper.number}</span>
                  <span class="pill ${taken ? "taken" : "available"}">${taken ? "Taken" : "Available"}</span>
                </div>
                <div class="paper-title">${escapeHtml(paper.title)}</div>
                <div class="citation">${escapeHtml(paper.citation)}</div>
                <div class="summary">${escapeHtml(paper.summary)}</div>
                <div class="linkrow"><a href="${paper.link}" target="_blank" rel="noreferrer">Open paper</a></div>
                <div><strong>Claimed by:</strong> ${claim ? escapeHtml(claim.student_name) : "—"}</div>
              </div>
              <div><button ${disabled ? "disabled" : ""}>${taken ? "Taken" : submittingId === paper.id ? "Claiming..." : "Claim this paper"}</button></div>`;

            const button = row.querySelector("button");
            button.addEventListener("click", async () => {
              const name = document.getElementById("name").value.trim();
              const code = document.getElementById("code").value.trim();
              if (!name) { setStatus("Enter both names first."); return; }
              if (!code) { setStatus("Enter the code first."); return; }
              try {
                submittingId = paper.id;
                setStatus("");
                render();
                await insertClaim(paper.id, name, code);
                document.getElementById("name").value = "";
                document.getElementById("code").value = "";
                setStatus("Paper claimed.");
                await load();
              } catch (error) {
                setStatus(error.message || "Could not save claim.");
                await load();
              } finally {
                submittingId = "";
                render();
              }
            });
            papersEl.appendChild(row);
          });
          schedule.appendChild(section);
        });
      }

      async function load() {
        try { claims = await fetchClaims(); }
        catch (error) { setStatus(error.message || "Failed to load claims."); }
        render();
      }

      load();
      window.setInterval(load, 10000);
    </script>
  </body>
</html>
